<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
    {% for service in services %}
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 hover:border-gray-700 transition-colors">
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-medium text-gray-200 truncate" title="{{ service.name }}">{{ service.name }}</h3>
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0
                {% if service.status == 'operational' %}bg-emerald-500
                {% elif service.status == 'degraded' %}bg-yellow-500
                {% elif service.status == 'partial_outage' %}bg-orange-500
                {% else %}bg-red-500{% endif %}
                {% if service.status == 'operational' %}pulse-dot{% endif %}"></span>
        </div>
        <div class="flex items-end justify-between">
            <div>
                <span class="text-xs capitalize
                    {% if service.status == 'operational' %}text-emerald-400
                    {% elif service.status == 'degraded' %}text-yellow-400
                    {% elif service.status == 'partial_outage' %}text-orange-400
                    {% else %}text-red-400{% endif %}">
                    {{ service.get_status_display }}
                </span>
            </div>
            <div class="text-right">
                <span class="text-lg font-mono font-semibold
                    {% if service.uptime_percentage >= 99.9 %}text-emerald-400
                    {% elif service.uptime_percentage >= 99 %}text-yellow-400
                    {% elif service.uptime_percentage >= 95 %}text-orange-400
                    {% else %}text-red-400{% endif %}">{{ service.uptime_percentage }}%</span>
                <p class="text-xs text-gray-600">uptime</p>
            </div>
        </div>
        {% if service.last_checked %}
        <div class="mt-3 pt-3 border-t border-gray-800">
            <span class="text-xs text-gray-600 font-mono">Checked {{ service.last_checked|timesince }} ago</span>
        </div>
        {% endif %}
    </div>
    {% empty %}
    <div class="col-span-full text-center py-8 text-gray-600">
        No services configured yet.
    </div>
    {% endfor %}
</div>
