<div class="flex items-center gap-2" x-data="{ showTooltip: false }">
    {% if online_users %}
    <div class="flex -space-x-1.5 relative" @mouseenter="showTooltip = true" @mouseleave="showTooltip = false">
        {% for presence in online_users|slice:":5" %}
        <div class="w-6 h-6 rounded-full bg-gray-700 border-2 border-gray-900 flex items-center justify-center text-xs font-medium text-gray-300 relative"
             title="{{ presence.user.username }}">
            {{ presence.user.username|make_list|first|upper }}
            <span class="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-emerald-500 border border-gray-900"></span>
        </div>
        {% endfor %}

        <!-- Tooltip -->
        <div x-show="showTooltip" x-cloak
             class="absolute top-full left-0 mt-2 bg-gray-900 border border-gray-700 rounded-lg shadow-xl z-50 py-2 px-3 min-w-[140px]">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1.5">Online Now</p>
            {% for presence in online_users %}
            <div class="flex items-center gap-2 py-0.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                <span class="text-xs text-gray-300">{{ presence.user.username }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
    <span class="text-xs text-gray-500">{{ online_users|length }} online</span>
    {% else %}
    <span class="text-xs text-gray-600">0 online</span>
    {% endif %}
</div>
