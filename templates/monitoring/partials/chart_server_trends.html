<div class="bg-gray-900 rounded-xl border border-gray-800 p-4">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-300">Server Resource Trends</h3>
        <div class="flex items-center gap-4 text-xs">
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="text-gray-500">CPU</span></span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span><span class="text-gray-500">Memory</span></span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-amber-500"></span><span class="text-gray-500">Disk</span></span>
        </div>
    </div>
    <div class="relative" style="height: 260px;" x-data x-init="
        fetch('{% url 'chart_server_history_all' %}')
            .then(r => r.json())
            .then(data => {
                const ctx = $refs.canvas.getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [
                            {
                                label: 'CPU %',
                                data: data.cpu,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.05)',
                                borderWidth: 2,
                                fill: false,
                                tension: 0.4,
                                pointRadius: 0,
                                pointHitRadius: 10,
                                pointHoverRadius: 4,
                                pointHoverBackgroundColor: '#10b981'
                            },
                            {
                                label: 'Memory %',
                                data: data.memory,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.05)',
                                borderWidth: 2,
                                fill: false,
                                tension: 0.4,
                                pointRadius: 0,
                                pointHitRadius: 10,
                                pointHoverRadius: 4,
                                pointHoverBackgroundColor: '#3b82f6'
                            },
                            {
                                label: 'Disk %',
                                data: data.disk,
                                borderColor: '#f59e0b',
                                backgroundColor: 'rgba(245, 158, 11, 0.05)',
                                borderWidth: 2,
                                fill: false,
                                tension: 0.4,
                                pointRadius: 0,
                                pointHitRadius: 10,
                                pointHoverRadius: 4,
                                pointHoverBackgroundColor: '#f59e0b'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#1f2937',
                                titleColor: '#d1d5db',
                                bodyColor: '#9ca3af',
                                borderColor: '#374151',
                                borderWidth: 1,
                                padding: 10,
                                callbacks: {
                                    label: function(ctx) {
                                        return ctx.dataset.label + ': ' + ctx.parsed.y + '%';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(75, 85, 99, 0.3)', drawBorder: false },
                                ticks: { color: '#6b7280', font: { size: 10, family: 'JetBrains Mono' }, maxRotation: 0, maxTicksLimit: 8 }
                            },
                            y: {
                                grid: { color: 'rgba(75, 85, 99, 0.3)', drawBorder: false },
                                ticks: { color: '#6b7280', font: { size: 10, family: 'JetBrains Mono' }, callback: function(v) { return v + '%'; } },
                                min: 0,
                                max: 100
                            }
                        }
                    }
                });
            })
            .catch(() => {
                $refs.canvas.parentElement.innerHTML = '<div class=\"flex items-center justify-center h-full text-gray-600 text-sm\">No server trend data available</div>';
            });
    ">
        <canvas x-ref="canvas"></canvas>
    </div>
</div>
