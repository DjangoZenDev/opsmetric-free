<div class="bg-gray-900 rounded-xl border border-gray-800 p-4">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-300">Response Time Trend</h3>
        <span class="text-xs text-gray-600 font-mono">Last 24h</span>
    </div>
    <div class="relative" style="height: 260px;" x-data x-init="
        fetch('{% url 'chart_response_times_all' %}')
            .then(r => r.json())
            .then(data => {
                const ctx = $refs.canvas.getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: 'Avg Response Time (ms)',
                            data: data.values,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHitRadius: 10,
                            pointHoverRadius: 4,
                            pointHoverBackgroundColor: '#10b981',
                            pointHoverBorderColor: '#fff',
                            pointHoverBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#1f2937',
                                titleColor: '#d1d5db',
                                bodyColor: '#9ca3af',
                                borderColor: '#374151',
                                borderWidth: 1,
                                padding: 10,
                                displayColors: false,
                                callbacks: {
                                    label: function(ctx) {
                                        return ctx.parsed.y + ' ms';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(75, 85, 99, 0.3)', drawBorder: false },
                                ticks: { color: '#6b7280', font: { size: 10, family: 'JetBrains Mono' }, maxRotation: 0, maxTicksLimit: 8 }
                            },
                            y: {
                                grid: { color: 'rgba(75, 85, 99, 0.3)', drawBorder: false },
                                ticks: { color: '#6b7280', font: { size: 10, family: 'JetBrains Mono' }, callback: function(v) { return v + 'ms'; } },
                                beginAtZero: true
                            }
                        }
                    }
                });
            })
            .catch(() => {
                $refs.canvas.parentElement.innerHTML = '<div class=\"flex items-center justify-center h-full text-gray-600 text-sm\">No response time data available</div>';
            });
    ">
        <canvas x-ref="canvas"></canvas>
    </div>
</div>
