<div class="mt-2 rounded-lg border p-2.5
    {% if execution.status == 'success' %}border-emerald-500/20 bg-emerald-500/5
    {% elif execution.status == 'failed' %}border-red-500/20 bg-red-500/5
    {% elif execution.status == 'running' %}border-blue-500/20 bg-blue-500/5
    {% else %}border-gray-700 bg-gray-800/50{% endif %}">
    <div class="flex items-center justify-between mb-1.5">
        <span class="inline-flex items-center gap-1.5 text-xs font-medium
            {% if execution.status == 'success' %}text-emerald-400
            {% elif execution.status == 'failed' %}text-red-400
            {% elif execution.status == 'running' %}text-blue-400
            {% else %}text-gray-400{% endif %}">
            {% if execution.status == 'success' %}
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            {% elif execution.status == 'failed' %}
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
            {% elif execution.status == 'running' %}
            <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            {% else %}
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {% endif %}
            {{ execution.get_status_display }}
        </span>
        <span class="text-xs text-gray-600 font-mono">{{ execution.duration }}</span>
    </div>
    {% if execution.output %}
    <pre class="text-xs font-mono text-gray-400 whitespace-pre-wrap break-all leading-relaxed bg-gray-950/50 rounded p-2 max-h-20 overflow-y-auto">{{ execution.output }}</pre>
    {% endif %}
</div>
